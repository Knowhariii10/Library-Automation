<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RFID Gate Security System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .status-indicator {
            width: 100%;
            height: 60px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            font-weight: bold;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .status-ready {
            background: #e8f5e9;
            color: #2e7d32;
            border: 2px solid #4caf50;
        }

        .status-checking {
            background: #fff3e0;
            color: #ef6c00;
            border: 2px solid #ff9800;
        }

        .status-authorized {
            background: #e8f5e9;
            color: #2e7d32;
            border: 2px solid #4caf50;
        }

        .status-unauthorized {
            background: #ffebee;
            color: #c62828;
            border: 2px solid #f44336;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        .rfid-input-container {
            margin-bottom: 30px;
        }

        .rfid-input-container label {
            display: block;
            margin-bottom: 10px;
            color: #333;
            font-weight: 600;
            font-size: 16px;
        }

        .rfid-inputs {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .rfid-inputs input {
            width: 60px;
            height: 70px;
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            border: 3px solid #ddd;
            border-radius: 10px;
            outline: none;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .rfid-inputs input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .book-info {
            background: #f5f5f5;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            display: none;
        }

        .book-info.show {
            display: block;
        }

        .book-info h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .book-info p {
            color: #666;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .book-info strong {
            color: #333;
        }

        .btn-reset {
            width: 100%;
            padding: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-reset:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .alarm-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 0, 0, 0.3);
            display: none;
            z-index: 9999;
            animation: flash 0.5s infinite;
        }

        .alarm-animation.active {
            display: block;
        }

        @keyframes flash {

            0%,
            100% {
                opacity: 0;
            }

            50% {
                opacity: 1;
            }
        }

        .log-container {
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
            background: #f9f9f9;
            border-radius: 10px;
            padding: 15px;
        }

        .log-entry {
            padding: 8px;
            margin-bottom: 5px;
            border-radius: 5px;
            font-size: 12px;
        }

        .log-entry.success {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .log-entry.error {
            background: #ffebee;
            color: #c62828;
        }

        .log-entry.info {
            background: #e3f2fd;
            color: #1565c0;
        }
    </style>
</head>

<body>
    <div class="alarm-animation" id="alarmAnimation"></div>

    <div class="container">
        <div class="header">
            <h1>🔒 RFID Gate Security</h1>
            <p>Library Exit Control System</p>
        </div>

        <div class="status-indicator status-ready" id="statusIndicator">
            ✓ Ready to Scan
        </div>

        <div class="rfid-input-container">
            <label for="rfid">Enter RFID Tag:</label>
            <div class="rfid-inputs">
                <input type="text" maxlength="1" class="rfid-digit" id="digit1" autofocus>
                <input type="text" maxlength="1" class="rfid-digit" id="digit2">
                <input type="text" maxlength="1" class="rfid-digit" id="digit3">
                <input type="text" maxlength="1" class="rfid-digit" id="digit4">
            </div>
        </div>

        <div class="book-info" id="bookInfo">
            <h3>Book Information</h3>
            <p><strong>Title:</strong> <span id="bookTitle">-</span></p>
            <p><strong>Author:</strong> <span id="bookAuthor">-</span></p>
            <p><strong>Status:</strong> <span id="bookStatus">-</span></p>
            <p><strong>Issued To:</strong> <span id="issuedTo">-</span></p>
        </div>

        <button class="btn-reset" onclick="resetForm()">Reset</button>

        <div class="log-container" id="logContainer"></div>
    </div>

    <audio id="alarmSound" preload="auto">
        <source src="alarm.mp3" type="audio/mpeg">
        <source src="alarm.wav" type="audio/wav">
    </audio>

    <script>
        // Configuration
        const API_BASE_URL = 'http://localhost:5001';

        // Get elements
        const inputs = document.querySelectorAll('.rfid-digit');
        const statusIndicator = document.getElementById('statusIndicator');
        const bookInfo = document.getElementById('bookInfo');
        const alarmAnimation = document.getElementById('alarmAnimation');
        const alarmSound = document.getElementById('alarmSound');
        const logContainer = document.getElementById('logContainer');

        // Auto-focus and auto-advance inputs
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                const value = e.target.value;

                if (value.length === 1) {
                    // Move to next input
                    if (index < inputs.length - 1) {
                        inputs[index + 1].focus();
                    } else {
                        // All 4 digits entered, check RFID
                        checkRFID();
                    }
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });

            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const pasteData = e.clipboardData.getData('text').slice(0, 4);
                pasteData.split('').forEach((char, i) => {
                    if (inputs[i]) {
                        inputs[i].value = char;
                    }
                });
                if (pasteData.length === 4) {
                    checkRFID();
                }
            });
        });

        async function checkRFID() {
            const rfid = Array.from(inputs).map(input => input.value).join('');

            if (rfid.length !== 4) {
                return;
            }

            // Update status
            statusIndicator.className = 'status-indicator status-checking';
            statusIndicator.textContent = '⏳ Checking RFID...';

            try {
                const response = await fetch(`${API_BASE_URL}/rfid/check/${rfid}`);
                const data = await response.json();

                if (data.success) {
                    if (data.is_rented) {
                        // Book is rented - AUTHORIZED EXIT
                        showAuthorized(data);
                        addLog('success', `✓ Authorized: ${data.book_title} (Rented to ${data.rented_to})`);
                    } else {
                        // Book is NOT rented - UNAUTHORIZED EXIT - TRIGGER ALARM
                        showUnauthorized(data);
                        triggerAlarm();
                        addLog('error', `⚠ ALARM! Unauthorized exit attempt: ${data.book_title}`);
                    }
                } else {
                    // RFID not found
                    statusIndicator.className = 'status-indicator status-unauthorized';
                    statusIndicator.textContent = '❌ RFID Not Found';
                    addLog('error', `❌ Invalid RFID: ${rfid}`);
                    setTimeout(resetForm, 3000);
                }
            } catch (error) {
                console.error('Error checking RFID:', error);
                statusIndicator.className = 'status-indicator status-unauthorized';
                statusIndicator.textContent = '❌ Connection Error';
                addLog('error', `❌ Error: ${error.message}`);
                setTimeout(resetForm, 3000);
            }
        }

        function showAuthorized(data) {
            statusIndicator.className = 'status-indicator status-authorized';
            statusIndicator.textContent = '✓ Authorized Exit';

            bookInfo.classList.add('show');
            document.getElementById('bookTitle').textContent = data.book_title;
            document.getElementById('bookAuthor').textContent = data.book_author;
            document.getElementById('bookStatus').textContent = 'Rented';
            document.getElementById('issuedTo').textContent = data.rented_to;

            setTimeout(resetForm, 5000);
        }

        function showUnauthorized(data) {
            statusIndicator.className = 'status-indicator status-unauthorized';
            statusIndicator.textContent = '🚨 UNAUTHORIZED EXIT - ALARM!';

            bookInfo.classList.add('show');
            document.getElementById('bookTitle').textContent = data.book_title;
            document.getElementById('bookAuthor').textContent = data.book_author;
            document.getElementById('bookStatus').textContent = 'NOT RENTED';
            document.getElementById('issuedTo').textContent = 'None';
        }

        function triggerAlarm() {
            alarmAnimation.classList.add('active');

            // Play alarm sound
            alarmSound.currentTime = 0;
            alarmSound.play().catch(e => console.log('Audio play failed:', e));

            // Stop alarm after 5 seconds
            setTimeout(() => {
                alarmAnimation.classList.remove('active');
                alarmSound.pause();
                resetForm();
            }, 5000);
        }

        function resetForm() {
            inputs.forEach(input => input.value = '');
            inputs[0].focus();
            statusIndicator.className = 'status-indicator status-ready';
            statusIndicator.textContent = '✓ Ready to Scan';
            bookInfo.classList.remove('show');
        }

        function addLog(type, message) {
            const logEntry = document.createElement('div');
            logEntry.className = `log-entry ${type}`;
            const timestamp = new Date().toLocaleTimeString();
            logEntry.textContent = `[${timestamp}] ${message}`;
            logContainer.insertBefore(logEntry, logContainer.firstChild);

            // Keep only last 10 logs
            while (logContainer.children.length > 10) {
                logContainer.removeChild(logContainer.lastChild);
            }
        }

        // Initialize
        addLog('info', 'System initialized and ready');
    </script>
</body>

</html>
